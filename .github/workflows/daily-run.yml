name: Daily Binance Screener

on:
  schedule:
    - cron: '45 23 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
      HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_ENABLED }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_SPREADSHEET_TOKEN: ${{ secrets.FEISHU_SPREADSHEET_TOKEN }}
      FEISHU_SPREADSHEET_URL: ${{ secrets.FEISHU_SPREADSHEET_URL }}
      FEISHU_TOKEN_JSON: ${{ secrets.FEISHU_TOKEN_JSON }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Feishu credentials
        run: |
          if [ -z "$FEISHU_APP_ID" ] || [ -z "$FEISHU_APP_SECRET" ]; then
            echo "Feishu credentials are not configured." >&2
            exit 1
          fi
          printf '{\n  "app_id": "%s",\n  "app_secret": "%s"\n}\n' \
            "$FEISHU_APP_ID" "$FEISHU_APP_SECRET" > feishu_config.json

      - name: Configure Feishu spreadsheet target
        if: ${{ env.FEISHU_SPREADSHEET_TOKEN != '' }}
        run: |
          printf '{\n  "spreadsheet_token": "%s",\n  "spreadsheet_url": "%s",\n  "description": "Configured by GitHub Actions"\n}\n' \
            "$FEISHU_SPREADSHEET_TOKEN" "$FEISHU_SPREADSHEET_URL" > feishu_spreadsheet_config.json

      - name: Restore Feishu OAuth token
        if: ${{ env.FEISHU_TOKEN_JSON != '' }}
        run: |
          printf '%s' "$FEISHU_TOKEN_JSON" > token.json

      - name: Run Binance screener
        run: python binance_token_screener_v3.0.py --auto --spot-count 80 --futures-count 80

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-output
          path: |
            *.log
            币安代币分析结果_*/**/*.xlsx
            币安代币分析结果_*/**/*.csv
          if-no-files-found: ignore
